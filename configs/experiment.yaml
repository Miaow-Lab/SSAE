global:
  seed: 1337
  device: cuda


n2g:
  init_name: Qwen/Qwen2.5-0.5B
  checkpoint_name: null # required, ckpt name for the model to extract latents from
  model_dir: null # required, directory containing checkpoint_name
  dataset: gsm8k # gsm8k/numina/opencodeinstruct
  input_file: data/gsm8k_385K_train.json
  eval_file: data/gsm8k_385K_valid.json
  batch_size: 1
  eval_batches: 500 # batch_size * eval_batches = total number of latents evaluated
  sparsity_factor: 1
  max_new_tokens: 256
  top_latents_k: 50 # the top k dimensions to consider for each latent
  pattern_k: 20 # number of patterns to mine for each latent
  suffix_ratio: 0.5 # threshold for short suffixes
  latent_active_threshold: 0.0 # minimum activation for a dimension to be considered active
  out_dir: n2g_results


probing_exp:
  init_name: Qwen/Qwen2.5-0.5B
  input_file: data/gsm8k_385K_valid.json # required, gsm8k/svamp/multiarith
  checkpoint_name: null # required, ckpt name for the model to extract latents from
  model_dir: null # required, directory containing checkpoint_name
  classifier_ckpt_path: null # required, classifier checkpoint path used in probe-guided stage
  task: correctness # optional, defaults to basename of input_file. (len/token/correctness/logicality)
  sparsity_factor: 1
  max_new_tokens: 256
  n_latents: 896
  hidden_dim: 1024
  classifier_dropout: 0.1
  k: 16 # number of sampled responses for majority voting
  tau: 0.8
  greedy_top_k: 200
  majority_temperature: 0.7
  majority_top_p: 0.9
  majority_top_k: 200
  out_dir: probe_results
  run_greedy: true
  run_majority: true
  run_probe_guided: true


n2g_analysis:
  model: null # required, e.g. gemini-3-pro-preview
  input_path: null # required, jsonl from N2G pattern output
  output_path: null # required, output labeled jsonl
  prompt_template_path: experiment/N2G/N2G_analysis/math_prompt.txt # required
  api_key: null # optional if OPENAI_API_KEY is set
  api_base: null # optional
  n: 1
  temperature: 0.0
  top_p: 1.0
  max_tokens: 32768
  retries: 2
  retry_sleep: 1.0
  workers: 16
  drop_last_row: true
